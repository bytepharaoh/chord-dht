<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Chord lookup hop path</title>
<desc>A key lookup for file1.txt starting from node 15, hopping through nodes 37 and 42 to reach node 49 in 3 hops</desc>

<defs>
  <marker id="hop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Label: looking up -->
<rect x="40" y="30" width="130" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text x="105" y="49" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#633806">file1.txt</text>
<text x="105" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#854F0B">hash = 43</text>

<!-- Arrow from key to start node -->
<line x1="170" y1="52" x2="198" y2="52" stroke="#BA7517" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#hop)"/>

<!-- Node 15 (start) -->
<circle cx="224" cy="90" r="30" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
<text x="224" y="86" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#085041">15</text>
<text x="224" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F6E56">start</text>
<text x="224" y="138" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">hop 1</text>

<!-- Arrow 1→2 -->
<path d="M 255 80 Q 310 50 345 80" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#hop)"/>
<text x="300" y="56" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">finger → 37</text>

<!-- Node 37 -->
<circle cx="370" cy="90" r="30" fill="#9FE1CB" stroke="#0F6E56" stroke-width="2"/>
<text x="370" y="86" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#04342C">37</text>
<text x="370" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#085041">relay</text>
<text x="370" y="138" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">hop 2</text>

<!-- Arrow 2→3 -->
<path d="M 401 80 Q 456 50 491 80" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#hop)"/>
<text x="446" y="56" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">finger → 42</text>

<!-- Node 42 -->
<circle cx="516" cy="90" r="30" fill="#5DCAA5" stroke="#085041" stroke-width="2"/>
<text x="516" y="86" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#04342C">42</text>
<text x="516" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#04342C">relay</text>
<text x="516" y="138" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">hop 3</text>

<!-- Arrow 3→found -->
<path d="M 547 80 Q 590 50 618 80" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#hop)"/>
<text x="588" y="56" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">successor = 49</text>

<!-- Node 49 (responsible) -->
<circle cx="640" cy="90" r="30" fill="#1D9E75" stroke="#04342C" stroke-width="2"/>
<text x="640" y="86" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">49</text>
<text x="640" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E1F5EE">found!</text>

<!-- Bottom label -->
<text x="340" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">3 hops to find the responsible node out of 5 — O(log N) in action</text>

</svg>
