<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Chord Finger Table — how shortcuts work</title>
<desc>Node 15 with its finger table showing 6 shortcut entries pointing to other nodes on the ring</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Node 15 box -->
<rect x="40" y="100" width="100" height="120" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="90" y="132" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#085041">15</text>
<text x="90" y="152" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">Charlie</text>
<text x="90" y="172" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5DCAA5">M = 6 slots</text>
<text x="90" y="190" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5DCAA5">Ring size = 64</text>

<!-- Finger table header -->
<rect x="180" y="40" width="320" height="36" rx="8" fill="#085041"/>
<text x="340" y="63" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#9FE1CB">Finger table for node 15</text>

<!-- Table rows -->
<!-- Entry 0 -->
<rect x="180" y="80" width="320" height="34" rx="0" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="210" y="102" font-family="monospace" font-size="11" fill="#444441">entry 0</text>
<text x="310" y="102" font-family="monospace" font-size="11" fill="#5F5E5A">(15 + 2⁰) % 64 = 16</text>
<text x="462" y="102" font-family="monospace" font-size="11" font-weight="600" fill="#085041">→ node 30</text>

<!-- Entry 1 -->
<rect x="180" y="114" width="320" height="34" rx="0" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="210" y="136" font-family="monospace" font-size="11" fill="#444441">entry 1</text>
<text x="310" y="136" font-family="monospace" font-size="11" fill="#5F5E5A">(15 + 2¹) % 64 = 17</text>
<text x="462" y="136" font-family="monospace" font-size="11" font-weight="600" fill="#085041">→ node 30</text>

<!-- Entry 2 -->
<rect x="180" y="148" width="320" height="34" rx="0" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="210" y="170" font-family="monospace" font-size="11" fill="#444441">entry 2</text>
<text x="310" y="170" font-family="monospace" font-size="11" fill="#5F5E5A">(15 + 2²) % 64 = 19</text>
<text x="462" y="170" font-family="monospace" font-size="11" font-weight="600" fill="#085041">→ node 30</text>

<!-- Entry 3 -->
<rect x="180" y="182" width="320" height="34" rx="0" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="210" y="204" font-family="monospace" font-size="11" fill="#444441">entry 3</text>
<text x="310" y="204" font-family="monospace" font-size="11" fill="#5F5E5A">(15 + 2³) % 64 = 23</text>
<text x="462" y="204" font-family="monospace" font-size="11" font-weight="600" fill="#085041">→ node 30</text>

<!-- Entry 4 -->
<rect x="180" y="216" width="320" height="34" rx="0" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="210" y="238" font-family="monospace" font-size="11" fill="#444441">entry 4</text>
<text x="310" y="238" font-family="monospace" font-size="11" fill="#5F5E5A">(15 + 2⁴) % 64 = 31</text>
<text x="462" y="238" font-family="monospace" font-size="11" font-weight="600" fill="#1D9E75">→ node 37</text>

<!-- Entry 5 -->
<rect x="180" y="250" width="320" height="34" rx="0" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="210" y="272" font-family="monospace" font-size="11" fill="#444441">entry 5</text>
<text x="310" y="272" font-family="monospace" font-size="11" fill="#5F5E5A">(15 + 2⁵) % 64 = 47</text>
<text x="462" y="272" font-family="monospace" font-size="11" font-weight="600" fill="#3B6D11">→ node 49</text>

<!-- Table border -->
<rect x="180" y="80" width="320" height="204" rx="0" fill="none" stroke="#B4B2A9" stroke-width="1"/>

<!-- Arrows from node to table -->
<line x1="140" y1="160" x2="178" y2="160" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)"/>

<!-- Right side: result nodes -->
<rect x="540" y="100" width="70" height="30" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text x="575" y="120" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#085041">30</text>

<rect x="540" y="160" width="70" height="30" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<text x="575" y="180" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#04342C">37</text>

<rect x="540" y="220" width="70" height="30" rx="6" fill="#5DCAA5" stroke="#085041" stroke-width="1"/>
<text x="575" y="240" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#04342C">49</text>

<!-- Arrows to result nodes -->
<line x1="502" y1="114" x2="538" y2="115" stroke="#085041" stroke-width="1" marker-end="url(#arr)"/>
<line x1="502" y1="148" x2="538" y2="115" stroke="#085041" stroke-width="0.7" stroke-dasharray="2 2" marker-end="url(#arr)"/>
<line x1="502" y1="182" x2="538" y2="115" stroke="#085041" stroke-width="0.7" stroke-dasharray="2 2" marker-end="url(#arr)"/>
<line x1="502" y1="216" x2="538" y2="115" stroke="#085041" stroke-width="0.7" stroke-dasharray="2 2" marker-end="url(#arr)"/>
<line x1="502" y1="232" x2="538" y2="175" stroke="#0F6E56" stroke-width="1" marker-end="url(#arr)"/>
<line x1="502" y1="266" x2="538" y2="235" stroke="#085041" stroke-width="1" marker-end="url(#arr)"/>

<!-- O(log N) label -->
<rect x="540" y="270" width="100" height="30" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="590" y="289" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#26215C">O(log N) hops</text>

</svg>
