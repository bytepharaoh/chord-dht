<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Chord churn — node leaving the ring</title>
<desc>Shows the ring before and after node 15 (Charlie) leaves, with remaining nodes rebalancing</desc>

<defs>
  <marker id="ca" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- BEFORE label -->
<rect x="40" y="20" width="280" height="26" rx="6" fill="#085041"/>
<text x="180" y="37" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#9FE1CB">BEFORE — 5 nodes</text>

<!-- Before ring nodes -->
<circle cx="80" cy="110" r="24" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="80" y="106" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#085041">15</text>
<text x="80" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0F6E56">Charlie</text>

<circle cx="150" cy="110" r="24" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="150" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#085041">30</text>

<circle cx="220" cy="110" r="24" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="220" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#085041">37</text>

<circle cx="290" cy="110" r="24" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="290" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#085041">42</text>

<circle cx="360" cy="110" r="24" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="360" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#085041">49</text>

<!-- Before arrows -->
<line x1="104" y1="110" x2="124" y2="110" stroke="#1D9E75" stroke-width="1" marker-end="url(#ca)"/>
<line x1="174" y1="110" x2="194" y2="110" stroke="#1D9E75" stroke-width="1" marker-end="url(#ca)"/>
<line x1="244" y1="110" x2="264" y2="110" stroke="#1D9E75" stroke-width="1" marker-end="url(#ca)"/>
<line x1="314" y1="110" x2="334" y2="110" stroke="#1D9E75" stroke-width="1" marker-end="url(#ca)"/>
<path d="M 384 110 Q 390 70 370 60 Q 50 40 68 90" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#ca)"/>

<!-- Keys on node 15 -->
<rect x="44" y="148" width="72" height="22" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
<text x="80" y="163" text-anchor="middle" font-family="monospace" font-size="9" fill="#633806">data.csv (12)</text>
<rect x="44" y="172" width="72" height="22" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
<text x="80" y="187" text-anchor="middle" font-family="monospace" font-size="9" fill="#633806">app.py (14)</text>

<!-- DIVIDER + LEAVE event -->
<line x1="420" y1="30" x2="420" y2="240" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="4 3"/>
<rect x="390" y="95" width="60" height="30" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text x="420" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#A32D2D">leaves</text>

<!-- AFTER label -->
<rect x="440" y="20" width="200" height="26" rx="6" fill="#085041"/>
<text x="540" y="37" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#9FE1CB">AFTER — 4 nodes</text>

<!-- After ring nodes -->
<circle cx="460" cy="110" r="24" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="460" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#085041">30</text>

<circle cx="520" cy="110" r="24" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="520" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#085041">37</text>

<circle cx="580" cy="110" r="24" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="580" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#085041">42</text>

<circle cx="640" cy="110" r="24" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="640" y="115" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#085041">49</text>

<!-- After arrows -->
<line x1="484" y1="110" x2="494" y2="110" stroke="#1D9E75" stroke-width="1" marker-end="url(#ca)"/>
<line x1="544" y1="110" x2="554" y2="110" stroke="#1D9E75" stroke-width="1" marker-end="url(#ca)"/>
<line x1="604" y1="110" x2="614" y2="110" stroke="#1D9E75" stroke-width="1" marker-end="url(#ca)"/>
<path d="M 664 110 Q 670 70 655 55 Q 450 40 448 90" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#ca)"/>

<!-- Keys moved to node 30 -->
<rect x="434" y="148" width="72" height="22" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
<text x="470" y="163" text-anchor="middle" font-family="monospace" font-size="9" fill="#633806">data.csv (12)</text>
<rect x="434" y="172" width="72" height="22" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
<text x="470" y="187" text-anchor="middle" font-family="monospace" font-size="9" fill="#633806">app.py (14)</text>
<text x="470" y="210" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0F6E56">↑ inherited by node 30</text>

<!-- Ghost node 15 -->
<circle cx="80" cy="110" r="24" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
<line x1="62" y1="92" x2="98" y2="128" stroke="#E24B4A" stroke-width="1.5" opacity="0.6"/>
<line x1="98" y1="92" x2="62" y2="128" stroke="#E24B4A" stroke-width="1.5" opacity="0.6"/>

<!-- Bottom stats -->
<rect x="40" y="225" width="600" height="24" rx="6" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="1"/>
<text x="340" y="241" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#085041">Avg hops before churn: 1.80   →   Avg hops after churn: 1.30   (fewer nodes = shorter paths)</text>

</svg>
