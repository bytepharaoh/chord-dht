<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord DHT - Ring Visualizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}">
</head>

<body>
    <div class="container">
        <h1>Chord DHT Ring Visualizer</h1>
        <p style="text-align:center;color:#64748b;font-size:13px;margin-top:-10px;margin-bottom:12px">
            Your own session — changes only affect your view 🔒
        </p>

        <div class="ring-container">
            <canvas id="ringCanvas" width="500" height="500"></canvas>
            <p style="text-align:center;color:#94a3b8;font-size:11px;margin-top:4px">
                Click any node to show finger table arrows
            </p>
        </div>

        <div class="info-panel">

            <!-- Key Lookup -->
            <div class="lookup-box">
                <h3>Key Lookup</h3>
                <input type="text" id="keyInput" placeholder="Type a key e.g. hello.txt">
                <button id="lookupBtn">Find responsible node</button>
                <div class="result" id="result"></div>
                <div class="path" id="path"></div>
            </div>

            <!-- Add Node -->
            <div class="lookup-box">
                <h3>Add Node</h3>
                <input type="text" id="addNodeInput" placeholder="Node name e.g. NodeF">
                <button id="addNodeBtn">Add Node</button>
                <div id="addNodeResult"></div>
            </div>

            <!-- Remove Node -->
            <div class="lookup-box">
                <h3>Remove Node</h3>
                <select id="removeNodeSelect"></select>
                <button id="removeNodeBtn">Remove Node</button>
                <div id="removeNodeResult"></div>
            </div>

            <!-- Active Nodes -->
            <div class="node-list">
                <h3>Active Nodes</h3>
                <ul id="nodeList"></ul>
                <div id="fingerInfo"></div>
                <button onclick="resetRing()"
                    style="margin-top:12px;background:#ef4444;color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px">
                    🔄 Reset Ring
                </button>
            </div>

        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
